<header class="legal-header">
  <div class="legal-header__main">
    <p class="legal-header__eyebrow">OGP Builder</p>
    <h1 class="legal-header__title">Импорт экзаменов</h1>
    <p class="legal-header__description">Тестовая страница для построчного импорта ответов из Google Sheets в отдельную базу данных.</p>
  </div>

  <aside class="legal-user-card">
    <div class="legal-user-card__top">
      <span class="legal-user-card__label">Пользователь</span>
      <strong class="legal-user-card__value">{{ username }}</strong>
    </div>
    <p class="legal-user-card__text">Импорт доступен только тестовым пользователям и не влияет на рабочие формы жалобы и реабилитации.</p>
    <div class="legal-user-card__actions">
      <a class="button-link secondary-button" href="/profile">Личный кабинет</a>
      <button type="button" id="logout-btn" class="ghost-button">Выйти</button>
    </div>
  </aside>
</header>
