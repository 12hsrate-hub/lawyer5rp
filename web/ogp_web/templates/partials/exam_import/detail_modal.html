<div id="exam-detail-modal" class="modal-backdrop" hidden>
  <div class="modal-card modal-card--wide" role="dialog" aria-modal="true" aria-labelledby="exam-detail-title">
    <button id="exam-detail-close" class="modal-close" type="button" aria-label="Закрыть окно">×</button>
    <p class="eyebrow">Ответ кандидата</p>
    <h2 id="exam-detail-title">Детальный разбор ответа</h2>
    <div id="exam-detail-meta" class="legal-status-row legal-status-row--three"></div>
    <div id="exam-detail-score" class="legal-subcard" hidden></div>

    <section class="legal-subcard exam-detail-transparency">
      <div class="legal-subcard__header">
        <div>
          <h3 class="legal-subcard__title">Поля ответа</h3>
          <p class="legal-subcard__description">Ниже показаны сохраненные поля и значения, по которым выполнялась проверка.</p>
        </div>
      </div>
      <div class="legal-table-shell exam-detail-shell">
        <table class="legal-table">
          <thead>
            <tr>
              <th>Столбец / Поле</th>
              <th>Значение</th>
            </tr>
          </thead>
          <tbody id="exam-detail-body">
            <tr>
              <td colspan="2" class="legal-table__empty">Выберите строку для просмотра.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <div class="actions modal-actions">
      <button id="exam-detail-ok" class="primary-button" type="button">Понятно</button>
    </div>
  </div>
</div>
