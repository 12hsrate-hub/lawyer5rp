<div id="ai-modal" class="modal-backdrop" hidden>
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="ai-modal-title">
    <button id="ai-modal-close" class="modal-close" type="button" aria-label="Закрыть окно">×</button>
    <p class="eyebrow">AI-вариант</p>
    <h2 id="ai-modal-title">Новый текст для описания</h2>
    <div id="ai-modal-text" class="success-box modal-message"></div>
    <div class="actions modal-actions">
      <button id="ai-modal-apply" class="primary-button" type="button">Подставить в описание</button>
      <button id="ai-modal-cancel" class="ghost-button" type="button">Пока не нужно</button>
    </div>
  </div>
</div>

<div id="complaint-ocr-modal" class="modal-backdrop" hidden>
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="complaint-ocr-modal-title">
    <button id="complaint-ocr-modal-close" class="modal-close" type="button" aria-label="Закрыть окно">×</button>
    <p class="eyebrow">Проверьте данные</p>
    <h2 id="complaint-ocr-modal-title">Данные доверителя подставлены</h2>
    <div id="complaint-ocr-modal-text" class="success-box modal-message"></div>
    <div class="actions modal-actions">
      <button id="complaint-ocr-modal-ok" class="primary-button" type="button">Понятно</button>
    </div>
  </div>
</div>

<div id="complaint-file-error-modal" class="modal-backdrop" hidden>
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="complaint-file-error-title">
    <button id="complaint-file-error-close" class="modal-close" type="button" aria-label="Закрыть окно">×</button>
    <p class="eyebrow">Ошибка файла</p>
    <h2 id="complaint-file-error-title">Проверьте файл договора</h2>
    <div id="complaint-file-error-text" class="errors modal-message"></div>
    <div class="actions modal-actions">
      <button id="complaint-file-error-ok" class="primary-button" type="button">Понятно</button>
    </div>
  </div>
</div>
