<section id="complaint-section-victim" class="panel legal-card legal-section legal-section--victim">
  <div class="legal-section__header">
    <div>
      <p class="legal-section__eyebrow">Раздел 1</p>
      <h2 class="legal-section__title">Потерпевший</h2>
      <p class="legal-section__description">Данные лица, в интересах которого подаётся обращение.</p>
    </div>
  </div>

  <div class="legal-field-grid legal-field-grid--two">
    <label class="legal-field">
      <span class="legal-field__label">ФИО</span>
      <input name="victim_name" placeholder="Имя Фамилия" required>
    </label>

    <label class="legal-field">
      <span class="legal-field__label">Паспорт</span>
      <input name="victim_passport" placeholder="123456" maxlength="6" required>
    </label>

    <label class="legal-field">
      <span class="legal-field__label">Адрес</span>
      <input name="victim_address" placeholder="Los Santos, Vespucci Blvd, 1" value="-">
    </label>

    <label class="legal-field">
      <span class="legal-field__label">Телефон</span>
      <input name="victim_phone" placeholder="1234567" inputmode="numeric" maxlength="7" pattern="\d{7}" required>
    </label>

    <label class="legal-field">
      <span class="legal-field__label">Discord</span>
      <input name="victim_discord" placeholder="nickname" required>
    </label>

    <label class="legal-field">
      <span class="legal-field__label">Скан паспорта URL</span>
      <input name="victim_scan" type="url" placeholder="https://example.com/passport" required>
    </label>
  </div>

  <section class="legal-subcard legal-subcard--ocr">
    <div class="legal-subcard__header">
      <div>
        <h3 class="legal-subcard__title">Автозаполнение по договору</h3>
        <p class="legal-subcard__description">Загрузите 4-ю страницу договора, чтобы автоматически заполнить данные доверителя.</p>
      </div>
    </div>

    <div class="legal-ocr">
      <div class="legal-ocr__controls">
        <label class="legal-file-field">
          <span class="legal-field__label">Файл договора</span>
          <div class="legal-file-picker">
            <label class="secondary-button legal-file-picker__button" for="complaint-ocr-file">Файл</label>
            <span id="complaint-ocr-file-name" class="legal-file-picker__name">Файл не выбран</span>
            <input id="complaint-ocr-file" class="legal-file-picker__input" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
          </div>
        </label>
        <button type="button" id="complaint-ocr-btn" class="secondary-button">Распознать данные</button>
      </div>

      <div id="complaint-ocr-status" class="legal-ocr__status">Статус: ожидает изображение.</div>
      <div id="complaint-ocr-progress" class="progress-box legal-ocr__progress" hidden>
        <span class="spinner" aria-hidden="true"></span>
        <span id="complaint-ocr-progress-text"></span>
      </div>
    </div>
  </section>
</section>
