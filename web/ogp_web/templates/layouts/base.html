<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ app_title }}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}?v={{ static_asset_version }}">
</head>
<body{% block body_attrs %}{% endblock %}>
  <main class="{% block main_class %}page{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', path='shared/common.js') }}?v={{ static_asset_version }}" defer></script>
  <script src="{{ url_for('static', path='shared/page.js') }}?v={{ static_asset_version }}" defer></script>
  {% block page_scripts %}{% endblock %}
</body>
</html>
