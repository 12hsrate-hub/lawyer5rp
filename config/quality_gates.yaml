gates:
  factual_integrity:
    target: 1.00
    comparator: ">="
    on_fail: fallback_factual_fallback_expanded
    retry_allowed: true
    max_retries: 2
  style_contract:
    target: 0.995
    comparator: ">="
    on_fail: warn
    retry_allowed: true
    max_retries: 1
  legal_linkage_grounded:
    target: 0.90
    comparator: ">="
    on_fail: fallback_factual_fallback_expanded
    retry_allowed: true
    max_retries: 2
  retry_rate:
    target: 0.12
    comparator: "<="
    on_fail: rollback_factual_fallback_expanded
    retry_allowed: false
    max_retries: 0
  cost_uplift:
    target: 0.35
    comparator: "<="
    on_fail: rollback_factual_fallback_expanded
    retry_allowed: false
    max_retries: 0

fallbacks:
  fallback_factual_fallback_expanded:
    force_mode: factual_fallback_expanded
    emergency_off: false
  rollback_factual_fallback_expanded:
    force_mode: factual_fallback_expanded
    emergency_off: true
