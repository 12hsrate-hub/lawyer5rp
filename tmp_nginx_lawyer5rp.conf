server {
    server_name lawyer5rp.online www.lawyer5rp.online lawyer5rp.ru www.lawyer5rp.ru 89.111.153.129;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/www.lawyer5rp.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/www.lawyer5rp.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.lawyer5rp.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = lawyer5rp.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name lawyer5rp.online www.lawyer5rp.online lawyer5rp.ru www.lawyer5rp.ru 89.111.153.129;
    return 308 https://www.lawyer5rp.online$request_uri;
}
