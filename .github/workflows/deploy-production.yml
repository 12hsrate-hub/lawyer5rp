name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Check deploy secrets
        id: check
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          missing=0

          if [ -z "$DEPLOY_HOST" ]; then
            echo "Missing secret: DEPLOY_HOST"
            missing=1
          fi

          if [ -z "$DEPLOY_USER" ]; then
            echo "Missing secret: DEPLOY_USER"
            missing=1
          fi

          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "Missing secret: DEPLOY_SSH_KEY"
            missing=1
          fi

          if [ "$missing" -eq 1 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

  deploy:
    needs: preflight
    runs-on: ubuntu-latest
    if: ${{ needs.preflight.outputs.ready == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Start SSH agent
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -

      - name: Trust deploy host
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" '
            set -euo pipefail
            mkdir -p /srv/lawyer5rp-deploy
            if [ ! -d /srv/lawyer5rp-deploy/repo/.git ]; then
              git clone https://github.com/12hsrate-hub/lawyer5rp.git /srv/lawyer5rp-deploy/repo
            fi
            git -C /srv/lawyer5rp-deploy/repo fetch origin
            git -C /srv/lawyer5rp-deploy/repo checkout main
            git -C /srv/lawyer5rp-deploy/repo reset --hard origin/main
            bash /srv/lawyer5rp-deploy/repo/scripts/deploy_from_checkout.sh
          '
