name: CI Runtime

on:
  push:
  pull_request:

jobs:
  stable-unit-tests:
    runs-on: ubuntu-latest
    env:
      OGP_WEB_SECRET: ci-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r web/requirements_web.txt

      - name: Run stable unit test suite
        run: |
          python -m unittest \
            tests.test_law_admin_service \
            tests.test_law_bundle_service \
            tests.test_bbcode_snapshots \
            tests.test_shared_core \
            tests.test_exam_scoring_golden \
            tests.test_ai_budget_service \
            tests.test_backup_script \
            tests.test_load_support \
            tests.test_perf_threshold_check \
            tests.test_synthetic_runner_service
